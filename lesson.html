<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lesson Training Module // Nighters Cyber Academy</title>
<style>
  :root {
    --bg: #0d0e12;
    --bg2: #151821;
    --line: #222633;
    --red: #ff3e3e;
    --red-dim: #2a1414;
    --txt: #e2e8f0;
    --dim: #94a3b8;
    --muted: #475569;
    --term-green: #39ff14;
    --term-bg: #05070a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { background: var(--bg); color: var(--txt); line-height: 1.6; padding-bottom: 60px; }
  
  /* Responsive Navigation */
  .nav { background: var(--bg2); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; }
  .logo { font-weight: 800; color: var(--red); text-decoration: none; letter-spacing: 1px; font-size: 1.1rem; }
  .logo small { color: var(--dim); font-size: 0.7rem; margin-left: 8px; font-weight: 400; }
  .nav-links a { color: var(--dim); text-decoration: none; font-size: 0.9rem; margin-left: 20px; font-weight: 500; }
  .nav-links a:hover { color: var(--txt); }

  .wrap { max-width: 900px; margin: 30px auto; padding: 0 20px; }
  
  /* Lesson Typography Elements */
  .hdr-block { margin-bottom: 28px; }
  .phase-tag { display: inline-block; background: var(--red-dim); color: var(--red); font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border: 1px solid var(--red); border-radius: 3px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .title { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .subtitle { color: var(--dim); font-size: 1.05rem; }

  .card { background: var(--bg2); border: 1px solid var(--line); border-radius: 6px; padding: 24px; margin-bottom: 24px; }
  .card-title { font-size: 1.15rem; font-weight: 700; color: #fff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
  
  /* Strict Malik@Root Retro Terminal Layout */
  .terminal-window { background: var(--term-bg); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; font-family: "Courier New", Courier, monospace; margin: 16px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .term-header { background: #1a1e29; padding: 8px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.r { background: #ff5f56; } .dot.y { background: #ffbd2e; } .dot.g { background: #27c93f; }
  .term-title { color: var(--dim); font-size: 0.75rem; margin-left: 8px; font-weight: 600; }
  .term-body { padding: 16px; overflow-x: auto; font-size: 0.9rem; min-height: 120px; white-space: pre-wrap; word-wrap: break-word; }
  
  /* Prompt Specific Formatting Rules */
  .prompt-row { margin-bottom: 14px; }
  .prompt-line { color: var(--term-green); font-weight: bold; display: block; margin-bottom: 4px; }
  .cmd-output { color: #ffffff; display: block; padding-left: 12px; border-left: 2px solid var(--muted); margin: 6px 0 12px 4px; font-size: 0.85rem; }
  .info-tag { color: #00bfff; font-style: italic; display: block; margin-bottom: 4px; }

  ul, ol { padding-left: 22px; margin-bottom: 16px; }
  li { margin-bottom: 8px; color: var(--txt); }

  /* Utility Control Buttons */
  .btn-group { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; margin-top: 30px; }
  .btn { background: var(--red); color: #fff; border: none; padding: 12px 24px; font-weight: 700; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .btn:hover { background: #e03232; }
  .btn-sec { background: transparent; border: 1px solid var(--line); color: var(--dim); }
  .btn-sec:hover { border-color: var(--dim); color: #fff; }

  /* Quiz and Assessment Modals */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,10,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--line); width: 100%; max-width: 600px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); display: flex; flex-direction: column; max-height: 90vh; }
  .modal-hd { padding: 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 1.2rem; font-weight: 700; color: #fff; }
  .modal-close { color: var(--dim); cursor: pointer; font-size: 1.2rem; }
  .modal-bd { padding: 24px; overflow-y: auto; flex-grow: 1; }
  .modal-ft { padding: 16px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 12px; background: #11141b; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }

  .q-item { margin-bottom: 24px; }
  .q-text { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #fff; }
  .opt-label { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--line); padding: 12px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
  .opt-label:hover { border-color: var(--muted); background: #12151d; }
  
  .feedback-area { margin-top: 16px; padding: 14px; border-radius: 4px; display: none; font-weight: 600; font-size: 0.9rem; }
  .feedback-success { background: rgba(39,201,63,0.15); border: 1px solid #27c93f; color: #27c93f; }
  .feedback-error { background: rgba(255,95,86,0.15); border: 1px solid #ff5f56; color: #ff5f56; }

  @media (max-width: 600px) {
    .title { font-size: 1.6rem; }
    .nav-links { display: none; } /* Mobile optimization fallback pattern */
    .btn-group { flex-direction: column; align-items: stretch; }
    .btn { width: 100%; }
  }
</style>
</head>
<body class="page">

<nav class="nav">
  <div class="nav-inner">
    <a href="dashboard.html" class="logo">NIGHTERS CYBER ACADEMY<small>// LAB TERMINAL CONTAINER</small></a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="levels.html">All Levels</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <div id="lesson-viewport">
    </div>

  <div class="btn-group">
    <button class="btn btn-sec" onclick="navigateLesson(-1)">← Return Previous</button>
    <button class="btn" onclick="openAssessmentBox()">Launch Challenge Quiz &amp; Progress</button>
    <button class="btn btn-sec" onclick="navigateLesson(1)">Advance Next →</button>
  </div>
</div>

<div class="modal-overlay" id="quiz-modal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modal-eval-title">Level Knowledge Verification Matrix</div>
      <span class="modal-close" onclick="closeAssessmentBox()">✕</span>
    </div>
    <div class="modal-bd" id="quiz-target-container">
      </div>
    <div id="modal-feedback" class="feedback-area"></div>
    <div class="modal-ft">
      <button class="btn btn-sec" onclick="closeAssessmentBox()">Dismiss</button>
      <button class="btn" onclick="evaluateSubmittedQuizAnswers()">Validate Evaluation Checks</button>
    </div>
  </div>
</div>

<script src="lessons-data.js"></script>
<script>
  let activeLevelId = 1;

  function fetchUrlParameterQueryId() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    if (!isNaN(id) && id >= 1 && id <= 30) {
      activeLevelId = id;
    }
  }

  function renderActiveWorkspaceLayout() {
    const currentLesson = getLessonById(activeLevelId);
    const container = document.getElementById('lesson-viewport');
    
    if (!currentLesson) {
      container.innerHTML = `<div class="card"><div class="card-title">Error</div><p>Requested operational blueprint index could not be verified.</p></div>`;
      return;
    }

    let dynamicSectionsHtml = '';
    currentLesson.sections.forEach(section => {
      let terminalInteractionBlock = '';
      if (section.cmd && section.cmd.length > 0) {
        let terminalLines = '';
        section.cmd.forEach(item => {
          if (item.type === 'comment') {
            terminalLines += `<div class="info-tag"># ${escapeTextString(item.val)}</div>`;
          } else if (item.type === 'prompt') {
            terminalLines += `<div class="prompt-row"><span class="prompt-line">malik@root:~# ${escapeTextString(item.val)}</span>`;
          } else if (item.type === 'output') {
            terminalLines += `<span class="cmd-output">${escapeTextString(item.val)}</span></div>`;
          }
        });

        terminalInteractionBlock = `
          <div class="terminal-window">
            <div class="term-header">
              <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
              <span class="term-title">malik@root: debian_environment_container (~/nca_labs)</span>
            </div>
            <div class="term-body">${terminalLines}</div>
          </div>`;
      }

      let strategicStepsHtml = '';
      if (section.steps && section.steps.length > 0) {
        strategicStepsHtml = `<ol>${section.steps.map(step => `<li>${escapeTextString(step)}</li>`).join('')}</ol>`;
      }

      dynamicSectionsHtml += `
        <div class="card">
          <div class="card-title">🛡️ ${escapeTextString(section.title)}</div>
          <p style="margin-bottom: 14px; color: var(--dim);">${escapeTextString(section.desc || '')}</p>
          ${strategicStepsHtml}
          ${terminalInteractionBlock}
        </div>`;
    });

    container.innerHTML = `
      <div class="hdr-block">
        <span class="phase-tag">Operational Phase ${currentLesson.phase} // Level ${String(currentLesson.id).padStart(2, '0')}</span>
        <h1 class="title">${escapeTextString(currentLesson.title)}</h1>
        <div class="subtitle">${escapeTextString(currentLesson.subtitle)}</div>
      </div>
      
      <div class="card">
        <div class="card-title">📌 Objectives Blueprint</div>
        <p style="margin-bottom:14px; font-weight:500;">${escapeTextString(currentLesson.intro)}</p>
        <ul>
          ${currentLesson.objectives.map(obj => `<li>${escapeTextString(obj)}</li>`).join('')}
        </ul>
      </div>

      ${dynamicSectionsHtml}

      <div class="card" style="border-left: 4px solid #ffbd2e;">
        <div class="card-title" style="color: #ffbd2e;">💡 Critical OpSec Infrastructure Hints</div>
        <ul>
          ${currentLesson.hints.map(hint => `<li>${escapeTextString(hint)}</li>`).join('')}
        </ul>
      </div>
    `;
  }

  function openAssessmentBox() {
    const currentLesson = getLessonById(activeLevelId);
    const container = document.getElementById('quiz-target-container');
    const feedbackBox = document.getElementById('modal-feedback');
    
    feedbackBox.style.display = 'none';
    feedbackBox.className = 'feedback-area';
    
    let quizFormStructure = '';
    currentLesson.quiz.forEach((question, index) => {
      let selectionOptions = '';
      question.opts.forEach((option, optIdx) => {
        selectionOptions += `
          <label class="opt-label">
            <input type="radio" name="q_eval_${index}" value="${optIdx}">
            <span>${escapeTextString(option)}</span>
          </label>`;
      });

      quizFormStructure += `
        <div class="q-item" data-correct-answer="${question.a}">
          <div class="q-text">${index + 1}. ${escapeTextString(question.q)}</div>
          ${selectionOptions}
        </div>`;
    });

    container.innerHTML = quizFormStructure;
    document.getElementById('quiz-modal').classList.add('open');
  }

  function closeAssessmentBox() {
    document.getElementById('quiz-modal').classList.remove('open');
  }

  function evaluateSubmittedQuizAnswers() {
    const currentLesson = getLessonById(activeLevelId);
    const items = document.querySelectorAll('.q-item');
    const feedbackBox = document.getElementById('modal-feedback');
    let totalCorrectCount = 0;

    items.forEach((item, index) => {
      const correctIdx = parseInt(item.getAttribute('data-correct-answer'));
      const selection = document.querySelector(`input[name="q_eval_${index}"]:checked`);
      
      if (selection && parseInt(selection.value) === correctIdx) {
        totalCorrectCount++;
      }
    });

    if (totalCorrectCount === items.length) {
      feedbackBox.textContent = `✓ Verification Complete! Earned ${currentLesson.points} Points. Workspace sync successfully passed.`;
      feedbackBox.className = 'feedback-area feedback-success';
      feedbackBox.style.display = 'block';
    } else {
      feedbackBox.textContent = `✗ Verification Failed. Input data anomalies detected. Review steps and logs before running checks again.`;
      feedbackBox.className = 'feedback-area feedback-error';
      feedbackBox.style.display = 'block';
    }
  }

  function navigateLesson(direction) {
    const nextTargetId = activeLevelId + direction;
    if (nextTargetId >= 1 && nextTargetId <= 30) {
      window.location.search = `?id=${nextTargetId}`;
    }
  }

  function escapeTextString(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Engine lifecycle triggers
  fetchUrlParameterQueryId();
  renderActiveWorkspaceLayout();
</script>

</body>
</html>
