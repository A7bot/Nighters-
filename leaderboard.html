<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leaderboard // Nighters Cyber Academy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page">
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">NIGHTERS CYBER ACADEMY<small>// RED TEAM TRAINING</small></a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="levels.html">Levels</a>
      <a href="leaderboard.html" class="on">Leaderboard</a>
      <a href="hall-of-fame.html">Hall of Fame</a>
      <a href="login.html">Login</a>
    </div>
  </div>
</nav>
<div class="wrap" style="padding-top:32px;padding-bottom:60px;">
  <div class="stitle mb8">Global Leaderboard</div>
  <div class="term mb24">
    <div class="p">Live rankings — refreshes every 60 seconds.</div>
    <div class="c">Points from: Levels + CTF + Exams + Attendance.</div>
  </div>

  <!-- FILTER -->
  <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;">
    <button class="btn btn-sm" id="f-all" onclick="filter('all',this)">All Students</button>
    <button class="btn btn-sm btn-dark" id="f-1" onclick="filter(1,this)">Phase 1</button>
    <button class="btn btn-sm btn-dark" id="f-2" onclick="filter(2,this)">Phase 2</button>
    <button class="btn btn-sm btn-dark" id="f-3" onclick="filter(3,this)">Phase 3</button>
  </div>

  <!-- PODIUM -->
  <div id="podium" style="display:flex;justify-content:center;align-items:flex-end;gap:12px;margin-bottom:32px;flex-wrap:wrap;"></div>

  <!-- FULL TABLE -->
  <div class="card" style="padding:0;">
    <div class="card-hd" style="padding:14px 20px;">FULL RANKINGS</div>
    <div id="lb-list"><div style="padding:40px;text-align:center;" class="mono td">Loading...</div></div>
  </div>

  <div id="my-pos-box" class="mt16"></div>
</div>
<footer class="footer"><strong>NIGHTERS CYBER ACADEMY</strong>Learn · Practice · Defend</footer>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let me=null,activeFilter='all';
(async()=>{try{const{data:{user}}=await sb.auth.getUser();me=user;}catch(e){}})();

async function filter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.wrap button').forEach(b=>{if(b.id&&b.id.startsWith('f-'))b.className='btn btn-sm btn-dark';});
  btn.className='btn btn-sm';
  load();
}

async function load(){
  try{
    let q=sb.from('profiles').select('id,username,points,phase,current_level,completed_challenges,streak').order('points',{ascending:false}).limit(100);
    if(activeFilter!=='all') q=q.eq('phase',activeFilter);
    const{data}=await q;
    if(!data||!data.length){document.getElementById('lb-list').innerHTML='<div style="padding:32px;text-align:center;" class="mono td">No students yet.</div>';return;}
    buildPodium(data.slice(0,3));
    buildList(data);
    if(me){const idx=data.findIndex(p=>p.id===me.id);if(idx>=0)showMyPos(data[idx],idx);}
  }catch(e){document.getElementById('lb-list').innerHTML='<div style="padding:24px;" class="mono tr tc">Failed to load.</div>';}
}

function buildPodium(top){
  const order=[top[1],top[0],top[2]];
  const colors=['#94a3b8','var(--red)','#cd7f32'];
  const labels=['2nd','1st','3rd'];
  const heights=['120px','160px','95px'];
  document.getElementById('podium').innerHTML=order.map((p,i)=>{
    if(!p)return'';
    const rank=getRank(p.points||0);
    return `<div style="text-align:center;flex:1;max-width:180px;">
      <div class="mono" style="font-size:.63rem;color:${colors[i]};letter-spacing:2px;margin-bottom:8px;">${labels[i]}</div>
      <div style="width:44px;height:44px;border:2px solid ${colors[i]};background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:var(--H);font-size:1.1rem;color:${colors[i]};margin:0 auto 8px;">${p.username[0].toUpperCase()}</div>
      <div style="font-size:.84rem;color:var(--txt);font-weight:600;">${esc(p.username)}</div>
      <div style="font-family:var(--H);font-size:.85rem;color:${colors[i]};margin-top:3px;">${p.points||0} PTS</div>
      <span class="badge ${rank.cls}" style="margin-top:6px;">${rank.name}</span>
      <div style="height:${heights[i]};background:rgba(225,29,72,0.04);border:1px solid ${colors[i]};border-bottom:none;margin-top:8px;"></div>
    </div>`;
  }).join('');
}

function buildList(data){
  document.getElementById('lb-list').innerHTML=data.map((p,i)=>{
    const cls=i===0?'lb-row r1':i===1?'lb-row r2':i===2?'lb-row r3':'lb-row';
    const rank=getRank(p.points||0);
    const isMe=me&&me.id===p.id;
    return `<div class="${cls}" style="${isMe?'background:rgba(225,29,72,0.06);':''}" >
      <div class="lb-num">#${i+1}</div>
      <div class="lb-av">${p.username[0].toUpperCase()}</div>
      <div class="lb-inf">
        <strong>${esc(p.username)}${isMe?' <span class="mono tr" style="font-size:.6rem;">(You)</span>':''}</strong>
        <small>Level ${p.current_level||1} · Phase ${p.phase||1} · ${p.completed_challenges||0} challenges</small>
      </div>
      <span class="badge ${rank.cls}">${rank.name}</span>
      <div class="lb-pts">${p.points||0} PTS</div>
    </div>`;
  }).join('');
}

function showMyPos(p,idx){
  const rank=getRank(p.points||0);
  document.getElementById('my-pos-box').innerHTML=`
    <div class="card-red" style="padding:14px 20px;">
      <div class="card-hd" style="margin-bottom:12px;">Your Position</div>
      <div class="lb-row" style="padding:0;">
        <div class="lb-num">#${idx+1}</div>
        <div class="lb-av">${p.username[0].toUpperCase()}</div>
        <div class="lb-inf"><strong>${esc(p.username)}</strong><small>Level ${p.current_level||1} · Phase ${p.phase||1}</small></div>
        <span class="badge ${rank.cls}">${rank.name}</span>
        <div class="lb-pts">${p.points||0} PTS</div>
      </div>
    </div>`;
}

load();
setInterval(load,60000);
</script>
</body>
</html>
