<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register // CyberAcademy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrix-bg"></canvas>

<nav class="navbar">
  <a href="index.html" class="logo">CYBER<span>ACADEMY</span></a>
  <div class="nav-links">
    <a href="login.html">Login</a>
  </div>
</nav>

<div class="container" style="max-width:480px;padding-top:60px;">

  <div class="section-title">// New Operative</div>

  <div class="terminal mb-32">
    <div class="line">Initializing secure registration channel...</div>
    <div class="line">All credentials are encrypted end-to-end.</div>
    <div class="comment">// Choose your callsign wisely. It cannot be changed.</div>
  </div>

  <div class="card">
    <div id="alert-box" class="alert"></div>

    <div class="form-group">
      <label><span>01</span> CALLSIGN (Username)</label>
      <input type="text" id="username" placeholder="e.g. ghost_r00t" maxlength="20">
    </div>

    <div class="form-group">
      <label><span>02</span> EMAIL ADDRESS</label>
      <input type="email" id="email" placeholder="operative@domain.com">
    </div>

    <div class="form-group">
      <label><span>03</span> ACCESS KEY (Password)</label>
      <input type="password" id="password" placeholder="Min. 8 characters">
    </div>

    <div class="form-group">
      <label><span>04</span> CONFIRM ACCESS KEY</label>
      <input type="password" id="confirm" placeholder="Repeat password">
    </div>

    <button class="btn" style="width:100%;margin-top:8px;" onclick="register()">
      [ REGISTER OPERATIVE ]
    </button>

    <p class="text-center mt-16" style="font-size:.78rem;color:var(--muted);">
      Already enlisted? <a href="login.html" style="color:var(--green);">Breach access &rarr;</a>
    </p>
  </div>
</div>

<footer>
  &copy; 2026 Nighters // AUTHORIZED TRAINING USE ONLY
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function register() {
  const username = document.getElementById('username').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;

  if (!username || !email || !password) {
    return showAlert('alert-box', 'All fields required.', 'error');
  }
  if (password.length < 8) {
    return showAlert('alert-box', 'Password must be at least 8 characters.', 'error');
  }
  if (password !== confirm) {
    return showAlert('alert-box', 'Passwords do not match.', 'error');
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: { data: { username, rank: 'Bronze', points: 0 } }
  });

  if (error) return showAlert('alert-box', error.message, 'error');

  showAlert('alert-box', 'Registration successful. Check your email to confirm.', 'success');
  setTimeout(() => window.location = 'login.html', 2500);
}
</script>

</body>
</html>
