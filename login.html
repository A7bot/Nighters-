<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login // Nighters Cyber Academy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page">
<canvas id="bg-canvas"></canvas>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">NIGHTERS CYBER ACADEMY<small>// RED TEAM TRAINING</small></a>
    <div class="nav-links"><a href="register.html">Enlist</a></div>
  </div>
</nav>
<div class="wrap-sm" style="padding-top:60px;padding-bottom:60px;">
  <div class="stitle mb12">Access Terminal</div>
  <div class="term mb24">
    <div class="p">Authenticating credentials...</div>
    <div class="c">All login attempts are logged and monitored.</div>
  </div>
  <div class="card-red">
    <div id="la" class="alert"></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="operative@domain.com" autocomplete="off"></div>
    <div class="field"><label>Password</label><input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-block" id="login-btn" onclick="doLogin()">Login</button>
    <div class="flex-between mt16">
      <p class="mono td" style="font-size:.72rem;">No account? <a href="register.html" style="color:var(--red);">Enlist →</a></p>
      <a href="reset.html" class="mono" style="font-size:.7rem;color:var(--muted);">Forgot password?</a>
    </div>
  </div>
</div>
<footer class="footer"><strong>NIGHTERS CYBER ACADEMY</strong>Authorized Training Platform</footer>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
(async()=>{try{const{data:{user}}=await sb.auth.getUser();if(user)window.location=ADMIN_EMAILS.includes(user.email)?'admin.html':'dashboard.html';}catch(e){}})();
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pw)return showAlert('la','Email and password required.','err');
  btn.disabled=true;btn.textContent='Authenticating...';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){
      let msg=error.message;
      if(msg.includes('Invalid login'))msg='Wrong email or password.';
      if(msg.includes('Email not confirmed'))msg='Please confirm your email first. Or ask admin to disable email confirmation in Supabase.';
      showAlert('la',msg,'err');btn.disabled=false;btn.textContent='Login';return;
    }
    const user=data.user;
    try{
      const{data:prof}=await sb.from('profiles').select('id').eq('id',user.id).maybeSingle();
      if(!prof){
        const uname=user.user_metadata?.username||email.split('@')[0];
        await sb.from('profiles').insert({id:user.id,username:uname,email,points:0,current_level:1,phase:1,strikes:0,completed_challenges:0,attendance_days:0,streak:0});
      }
    }catch(e){}
    try{await sb.from('login_log').insert({user_id:user.id,fingerprint:fingerprint()});}catch(e){}
    showAlert('la','Access granted.','ok');
    setTimeout(()=>window.location=ADMIN_EMAILS.includes(email)?'admin.html':'dashboard.html',700);
  }catch(e){showAlert('la','Connection error. Check Supabase URL in app.js','err');btn.disabled=false;btn.textContent='Login';}
}
</script>
</body>
</html>
