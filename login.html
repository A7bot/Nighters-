<style>
  /* Base structural corrections for total cross-device compatibility */
  body.matrix-portal {
    background-color: #050a05 !important;
    background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0));

    font-family: 'JetBrains Mono', monospace !important;
    color: #39ff14 !important;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    overflow-x: hidden; /* Prevents mobile side-scrolling completely */
  }

  *, *:before, *:after {
    box-sizing: inherit;
  }

  /* Robust container wrapping everything seamlessly on desktop & mobile */

    width: 100%;

    margin: auto;

  /* Responsive typography scaling */
  .portal-header {
    margin-bottom: 30px;
  }

  .portal-title {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 700;
    color: #39ff14;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  .portal-subtitle {
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    color: #20c20e;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-top: 4px;
  }

  .portal-form-title {
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    color: #39ff14;
    font-weight: 700;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  /* Form Elements layout */
  .matrix-field {
    margin-bottom: 20px;
  }

  .matrix-field label {
    display: block;
    color: #39ff14 !important;
    text-transform: uppercase;
    font-size: 0.8rem;
    margin-bottom: 6px;
  }

  .matrix-field input {
    width: 100%;
    background: rgba(0, 0, 0, 0.7) !important;
    color: #39ff14 !important;
    border: 2px solid #20c20e !important;
    border-radius: 6px !important;
    padding: 12px 14px !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 1rem;
    outline: none;
    box-shadow: 0 0 8px rgba(57, 255, 20, 0.15);
    -webkit-appearance: none; /* Disables standard iOS rendering styles */
  }

  .matrix-field input:focus {
    border-color: #39ff14 !important;
    box-shadow: 0 0 12px rgba(57, 255, 20, 0.4) !important;
  }

  .matrix-field input::placeholder {
    color: rgba(57, 255, 20, 0.3) !important;
  }

  /* Solid responsive button adjustments */
  .matrix-btn {
    width: 100%;
    background: #39ff14 !important;
    color: #000000 !important;
    border: none !important;
    border-radius: 6px !important;
    padding: 14px 20px !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 1rem !important;
    font-weight: 700 !important;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
    transition: background 0.2s ease;
  }

  .matrix-btn:hover {
    background: #20c20e !important;
    box-shadow: 0 0 20px rgba(57, 255, 20, 0.7);
  }

  .matrix-btn:disabled {
    background: #124d07 !important;
    color: #555 !important;
    box-shadow: none;
  }

  /* Decorative Graphic Component styling */
  .portal-graphic {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    max-width: 500px;
  }

  .portal-graphic svg {
    width: 100%;
    height: auto;
    max-height: 400px;
  }

  .portal-footer {
    text-align: center;
    padding: 20px;
    font-size: 0.7rem;
    color: rgba(57, 255, 20, 0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .matrix-links {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
    gap: 10px;
    flex-wrap: wrap; /* Wraps links on tiny screens to avoid breaking out */
  }

  .matrix-links a {
    color: #20c20e !important;
    text-decoration: none;
    font-size: 0.75rem;
  }
  
  .matrix-links a:hover {
    color: #39ff14 !important;
    text-decoration: underline;
  }
  
  .matrix-alert {
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    display: none;
  }
  .matrix-alert.err {
    display: block;
    background: rgba(220, 38, 38, 0.2);
    border: 1px solid #dc2626;
    color: #fca5a5;
  }
  .matrix-alert.ok {
    display: block;
    background: rgba(34, 197, 94, 0.2);
    border: 1px solid #22c55e;
    color: #bbf7d0;
  }

  /* Hard Breakpoint fixes targeting all smartphone devices */
  @media (max-width: 820px) {
    .portal-container {
      flex-direction: column;
      padding: 30px 16px;
    }
    .portal-graphic {
      display: none !important; /* Hides heavy decorative elements for performance & layout fit */
    }
    .portal-form-wrapper {
      max-width: 100%;
    }
  }
</style>
</head>
<body class="matrix-portal">

      <div class="matrix-field">
        <label for="pw">Password</label>
        <input type="password" id="pw" placeholder="****************" onkeydown="if(event.key==='Enter')doLogin()">

      <button class="matrix-btn" id="login-btn" onclick="doLogin()">Initiate Session</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
(async()=>{try{const{data:{user}}=await sb.auth.getUser();if(user)window.location=ADMIN_EMAILS.includes(user.email)?'admin.html':'dashboard.html';}catch(e){}})();[cite: 2]

function showAlert(id, msg, type) {
  const alertEl = document.getElementById(id);
  alertEl.className = 'matrix-alert ' + type;
  alertEl.textContent = msg;
}

async function doLogin(){
  const email=document.getElementById('email').value.trim();[cite: 2]
  const pw=document.getElementById('pw').value;[cite: 2]
  const btn=document.getElementById('login-btn');[cite: 2]
  if(!email||!pw)return showAlert('la','Email and password required.','err');[cite: 2]
  btn.disabled=true;btn.textContent='Authenticating...';[cite: 2]
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});[cite: 2]
    if(error){
      let msg=error.message;[cite: 2]
      if(msg.includes('Invalid login'))msg='Wrong email or password.';[cite: 2]
      if(msg.includes('Email not confirmed'))msg='Please confirm your email first. Or ask admin to disable email confirmation in Supabase.';[cite: 2]
      showAlert('la',msg,'err');btn.disabled=false;btn.textContent='Initiate Session';return;
    }
    const user=data.user;[cite: 2]
    try{
      const{data:prof}=await sb.from('profiles').select('id').eq('id',user.id).maybeSingle();
      if(!prof){
        const uname=user.user_metadata?.username||email.split('@')[0];[cite: 2]
        await sb.from('profiles').insert({id:user.id,username:uname,email,points:0,current_level:1,phase:1,strikes:0,completed_challenges:0,attendance_days:0,streak:0});[cite: 2]
      }
    }catch(e){}
    try{await sb.from('login_log').insert({user_id:user.id,fingerprint:fingerprint()});}catch(e){}
    showAlert('la','Access granted.','ok');[cite: 2]
    setTimeout(()=>window.location=ADMIN_EMAILS.includes(email)?'admin.html':'dashboard.html',700);
  }catch(e){showAlert('la','Connection error. Check Supabase URL in app.js','err');btn.disabled=false;btn.textContent='Initiate Session';}[cite: 2]
}
</script>
