<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login // Nighters Cyber Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  /* --- PREMIUM DEEP CYAN CYAN/CYBER PALETTE SYSTEM --- */
  :root {
      --bg-deep: #060913;
      --bg-surface: #0d1321;
      --bg-input: #03050a;
      --border: #1e293b;
      --accent-cyan: #00f0ff;
      --text-main: #f1f5f9;
      --text-muted: #64748b;
      --text-red: #ef4444;
      --font: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
      background-image: radial-gradient(circle at center, #0d172e 0%, #060913 100%);
  }

  body::before {
      content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
      background-size: 100% 4px; z-index: 9999; pointer-events: none; opacity: 0.15;
  }

  #bg-canvas {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 1; opacity: 0.15; pointer-events: none;
  }

  .portal-container {
      width: 100%; max-width: 1100px; margin: auto; padding: 24px;
      display: flex; flex-direction: row; align-items: center; justify-content: center;
      gap: 50px; position: relative; z-index: 10; flex-grow: 1;
  }

  .auth-box {
      width: 100%; max-width: 440px; background: var(--bg-surface);
      border: 1px solid var(--border); border-top: 4px solid var(--accent-cyan);
      padding: 35px; border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 240, 255, 0.05);
  }

  .portal-header h2 {
      font-size: clamp(1.4rem, 4vw, 1.8rem); font-weight: 700;
      letter-spacing: 1.5px; color: var(--text-main); text-transform: uppercase; margin-bottom: 6px;
  }

  .portal-header p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 25px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 0.75rem; margin-bottom: 6px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px;}
  
  .form-control {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border);
      padding: 14px; color: #fff; font-family: var(--font); font-size: 0.95rem; outline: none;
      border-radius: 8px; transition: all 0.25s ease;
  }
  .form-control:focus { border-color: var(--accent-cyan); box-shadow: 0 0 12px rgba(0, 240, 255, 0.15); }

  .btn {
      width: 100%; background: transparent; border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan); padding: 14px; font-family: var(--font);
      font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
      border-radius: 6px; font-size: 0.9rem; transition: all 0.2s;
  }
  .btn:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 20px rgba(0,240,255,0.35); }
  .btn:disabled { border-color: var(--border); color: var(--text-muted); background: transparent; cursor: not-allowed; }

  .meta-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 18px; text-align: center; }
  .meta-text a { color: var(--accent-cyan); text-decoration: none; cursor: pointer; }
  .meta-text a:hover { text-decoration: underline; }

  /* --- TOAST SYSTEM INTERFACES --- */
  #toast-wrap {
      position: fixed; bottom: 20px; right: 20px; z-index: 10000;
      display: flex; flex-direction: column; gap: 10px; max-width: 350px; width: calc(100% - 40px);
  }
  .toast {
      background: var(--bg-surface); border: 1px solid var(--border); border-left: 4px solid var(--text-red);
      color: var(--text-main); padding: 16px; border-radius: 8px; font-size: 0.85rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: space-between;
      gap: 12px; transform: translateY(20px); opacity: 0; animation: toastIn 0.3s cubic-bezier(0.1, 1, 0.1, 1) forwards;
  }
  .toast.t-ok { border-left-color: var(--accent-cyan); }
  .toast .tx { cursor: pointer; color: var(--text-muted); font-size: 0.8rem; padding: 2px 6px; }
  .toast .tx:hover { color: var(--text-main); }
  @keyframes toastIn { to { transform: translateY(0); opacity: 1; } }

  .alert { display: none !important; }

  .portal-graphic { flex: 1; display: flex; justify-content: center; align-items: center; max-width: 450px; }
  .portal-graphic svg { width: 100%; height: auto; max-height: 380px; }
  .portal-footer { text-align: center; padding: 20px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; z-index: 10; }

  @media (max-width: 820px) {
      .portal-container { flex-direction: column; padding: 40px 20px; }
      .portal-graphic { display: none !important; }
      .auth-box { max-width: 100%; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="toast-wrap"></div>
<div id="la" class="alert"></div>

<div class="portal-container">
  <div class="auth-box">
    <header class="portal-header">
      <h2>System Login</h2>
      <p>Nighters Cyber Academy Gateway</p>
    </header>

    <main>
      <div class="form-group">
        <label>Username / Email </label>
        <input type="email" id="email" class="form-control" placeholder="operative@domain.com" autocomplete="off">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pw" class="form-control" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      
      <button class="btn" id="login-btn" onclick="doLogin()">Initialize Link</button>
      
      <div class="meta-text">
        New User? <a href="register.html">Click Here</a>
      </div>
    </main>
  </div>

  <div class="portal-graphic">
    <svg viewBox="0 0 100 100" style="stroke: var(--border); stroke-width: 0.4; fill: none;">
      <line x1="10" y1="30" x2="30" y2="10" opacity="0.3"/>
      <line x1="30" y1="10" x2="60" y2="15" />
      <line x1="60" y1="15" x2="80" y2="35" stroke-width="0.6" style="stroke: var(--accent-cyan);" />
      <line x1="80" y1="35" x2="90" y2="65" />
      <line x1="90" y1="65" x2="70" y2="85" />
      <line x1="70" y1="85" x2="40" y2="80" />
      <line x1="15" y1="55" x2="10" y2="30" />
      <line x1="30" y1="10" x2="50" y2="45" opacity="0.5"/>
      <line x1="60" y1="15" x2="50" y2="45" />
      <line x1="80" y1="35" x2="50" y2="45" stroke-width="0.5" />
      <line x1="75" y1="55" x2="50" y2="45" />
      <circle cx="60" cy="15" r="2.5" fill="var(--accent-cyan)" />
      <circle cx="90" cy="65" r="3" fill="var(--accent-cyan)" />
      <circle cx="75" cy="55" r="2" fill="var(--accent-cyan)" />
    </svg>
  </div>
</div>

<footer class="portal-footer">
 For Educational Purpose Only!
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
// This initializes the Supabase client using the global variables loaded directly from your app.js file
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Bridge old alert logic directly into your new toast component
function showAlert(id, msg, type) {
  toast(msg, type);
}

async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pw)return showAlert('la','Email and password required.','err');
  btn.disabled=true;btn.textContent='Authenticating...';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){
      let msg=error.message;
      if(msg.includes('Invalid login'))msg='Wrong email or password.';
      if(msg.includes('Email not confirmed'))msg='Please confirm your email first. Or ask admin to disable email confirmation in Supabase.';
      showAlert('la',msg,'err');btn.disabled=false;btn.textContent='Initialize Link';return;
    }
    const user=data.user;
    try{
      const{data:prof}=await sb.from('profiles').select('id').eq('id',user.id).maybeSingle();
      if(!prof){
        const uname=user.user_metadata?.username||email.split('@')[0];
        await sb.from('profiles').insert({id:user.id,username:uname,email,points:0,current_level:1,phase:1,strikes:0,completed_challenges:0,attendance_days:0,streak:0});
      }
    }catch(e){}
    try{await sb.from('login_log').insert({user_id:user.id,fingerprint:fingerprint()});}catch(e){}
    
    // Welcome Toast Event trigger
    const username = user.user_metadata?.username || email.split('@')[0];
    toast(`Welcome back, ${username} // Access Granted`, 'ok');
    
    setTimeout(()=>window.location=ADMIN_EMAILS.includes(email)?'admin.html':'dashboard.html',1200);
  }catch(e){
    showAlert('la','Handshake connection error.','err');
    btn.disabled=false;btn.textContent='Initialize Link';
  }
}
</script>
</body>
</html>
