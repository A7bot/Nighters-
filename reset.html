<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Key // Nighters Cyber Academy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page">
<canvas id="bg-canvas"></canvas>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">NIGHTERS CYBER ACADEMY<small>// RED TEAM TRAINING PLATFORM</small></a>
    <div class="nav-links"><a href="login.html">Login</a></div>
  </div>
</nav>
<div class="wrap-sm" style="padding-top:60px;padding-bottom:60px;">
  <div class="stitle mb16">Reset Access Key</div>
  <div class="term mb24">
    <div class="p">Enter your registered email address.</div>
    <div class="c">A reset link will be sent if the account exists.</div>
  </div>
  <div class="card">
    <div id="ra" class="alert"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="operative@domain.com" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn btn-block" onclick="doReset()">Send Reset Link</button>
    <p class="tc mt16 mono tm" style="font-size:.72rem;"><a href="login.html" style="color:var(--gold);">← Back to login</a></p>
  </div>
</div>
<footer class="footer"><strong>NIGHTERS CYBER ACADEMY</strong>Authorized Training Platform</footer>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
async function doReset(){
  const email = document.getElementById('email').value.trim();
  if(!email) return showAlert('ra','Enter your email address.','err');
  const {error} = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  if(error) return showAlert('ra', error.message, 'err');
  showAlert('ra','Reset link sent. Check your inbox.','ok');
}
</script>
</body>
</html>
