<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password // Nighters Cyber Academy</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page">
<canvas id="bg-canvas"></canvas>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">NIGHTERS CYBER ACADEMY<small>// RED TEAM TRAINING</small></a>
    <div class="nav-links"><a href="login.html">Login</a></div>
  </div>
</nav>
<div class="wrap-sm" style="padding-top:60px;padding-bottom:60px;">
  <div class="stitle mb12">Reset Password</div>
  <div class="term mb24">
    <div class="p">Enter your email to receive a reset link.</div>
    <div class="c">Check your spam folder if you do not see the email.</div>
  </div>
  <div class="card-red">
    <div id="ra" class="alert"></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="operative@domain.com" onkeydown="if(event.key==='Enter')doReset()"></div>
    <button class="btn btn-block" onclick="doReset()">Send Reset Link</button>
    <p class="tc mt16 mono td" style="font-size:.72rem;"><a href="login.html" style="color:var(--red);">← Back to login</a></p>
  </div>
</div>
<footer class="footer"><strong>NIGHTERS CYBER ACADEMY</strong>Authorized Training Platform</footer>
<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
async function doReset(){
  const email=document.getElementById('email').value.trim();
  if(!email)return showAlert('ra','Enter your email.','err');
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/login.html'});
  if(error)return showAlert('ra',error.message,'err');
  showAlert('ra','Reset link sent. Check your inbox.','ok');
}
</script>
</body>
</html>
